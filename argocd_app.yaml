apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: python-app-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Danielsh124/project_phase3.git'
    targetRevision: HEAD
    path: mychart
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: project-phase3
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
